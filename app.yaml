command:
  - python
  - -m
  - uvicorn
  - server.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"
env:
  - name: WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: FACILITY_TABLE
    value: workspace.careproof.facility_clean
  - name: EVIDENCE_TABLE
    value: workspace.careproof.facility_capability_evidence
  - name: TRUST_TABLE
    value: workspace.careproof.facility_trust_profile
  - name: REGION_TABLE
    value: workspace.careproof.region_summary
  - name: LAKEBASE_INSTANCE
    value: careproof-reviews
