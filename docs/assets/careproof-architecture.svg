<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title description">
  <title id="title">CareProof India evidence-to-decision architecture</title>
  <desc id="description">Databricks Marketplace data flows through Unity Catalog, a deterministic SQL trust layer, Databricks SQL and FastAPI, into a React planner workspace. MLflow validates releases, Lakebase stores human decisions, and GitHub Pages serves a read-only judge snapshot.</desc>
  <!-- Technology logo paths are from Simple Icons (CC0); all trademarks remain property of their owners. -->
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf6"/>
      <stop offset="1" stop-color="#edf5f0"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#062e33"/>
      <stop offset="1" stop-color="#0a514f"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L9 5L1 9Z" fill="#6d9d93"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#062e33" flood-opacity="0.09"/>
    </filter>
    <symbol id="databricks-logo" viewBox="0 0 24 24">
      <path d="M.95 14.184L12 20.403l9.919-5.55v2.21L12 22.662l-10.484-5.96-.565.308v.77L12 24l11.05-6.218v-4.317l-.515-.309L12 19.118l-9.867-5.653v-2.21L12 16.805l11.05-6.218V6.32l-.515-.308L12 11.974 2.647 6.681 12 1.388l7.76 4.368.668-.411v-.566L12 0 .95 6.27v.72L12 13.207l9.919-5.55v2.26L12 15.52 1.516 9.56l-.565.308Z"/>
    </symbol>
    <symbol id="fastapi-logo" viewBox="0 0 24 24">
      <path d="M12 .0387C5.3729.0384.0003 5.3931 0 11.9988c-.001 6.6066 5.372 11.9628 12 11.9625 6.628.0003 12.001-5.3559 12-11.9625-.0003-6.6057-5.3729-11.9604-12-11.96m-.829 5.4153h7.55l-7.5805 5.3284h5.1828L5.279 18.5436q2.9466-6.5444 5.892-13.0896"/>
    </symbol>
    <symbol id="mlflow-logo" viewBox="0 0 24 24">
      <path d="M11.883.002a12.044 12.044 0 0 0-9.326 19.463l3.668-2.694A7.573 7.573 0 0 1 12.043 4.45v2.867l6.908-5.14A12.012 12.012 0 0 0 11.883.002zm9.562 4.533L17.777 7.23a7.573 7.573 0 0 1-5.818 12.322v-2.867l-6.908 5.14a12.046 12.046 0 0 0 16.394-17.29z"/>
    </symbol>
    <symbol id="github-logo" viewBox="0 0 24 24">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </symbol>
    <style>
      .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .eyebrow { font-size: 15px; font-weight: 700; letter-spacing: 1.5px; }
      .node-title { font-size: 25px; font-weight: 700; fill: #062e33; }
      .node-copy { font-size: 17px; fill: #566b65; }
      .node-label { font-size: 13px; font-weight: 700; letter-spacing: 1.3px; }
      .control-title { font-size: 22px; font-weight: 700; fill: #062e33; }
      .control-copy { font-size: 16px; fill: #60736d; }
      .metric { font-size: 27px; font-weight: 700; fill: #ffffff; }
      .metric-label { font-size: 12px; font-weight: 700; fill: #b9d5ce; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1600" height="820" rx="28" fill="url(#page)"/>
  <rect x="38" y="34" width="1524" height="113" rx="22" fill="url(#hero)"/>
  <rect x="68" y="61" width="58" height="58" rx="15" fill="#ffffff" opacity="0.12"/>
  <path d="M97 75c-14 0-24 9-24 21 0 15 13 25 24 29 11-4 24-14 24-29 0-12-10-21-24-21Z" fill="none" stroke="#ffffff" stroke-width="3"/>
  <path d="m85 97 8 8 17-19" fill="none" stroke="#77d3c4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="146" y="81" class="sans eyebrow" fill="#75d0c1">CAREPROOF INDIA  |  FACILITY TRUST DESK</text>
  <text x="146" y="117" class="serif" font-size="34" font-weight="700" fill="#ffffff">From marketplace claims to auditable planning decisions</text>
  <text x="1420" y="81" text-anchor="end" class="sans eyebrow" fill="#75d0c1">DATABRICKS APP</text>

  <text x="58" y="181" class="sans eyebrow" fill="#0b766e">THE LIVE DATA FLOW</text>

  <!-- Flow arrows -->
  <g fill="none" stroke="#6d9d93" stroke-width="3" marker-end="url(#arrow)">
    <path d="M314 321H352"/>
    <path d="M620 321H658"/>
    <path d="M926 321H964"/>
    <path d="M1232 321H1270"/>
  </g>

  <!-- Node 1 -->
  <g filter="url(#shadow)">
    <rect x="58" y="201" width="256" height="239" rx="18" fill="#ffffff" stroke="#d1ddd8"/>
    <rect x="58" y="201" width="256" height="7" rx="4" fill="#ff3621"/>
  </g>
  <rect x="78" y="228" width="54" height="54" rx="14" fill="#fff0ed"/>
  <use href="#databricks-logo" x="91" y="240" width="28" height="28" fill="#ff3621"/>
  <text x="148" y="246" class="sans node-label" fill="#ff3621">SOURCE</text>
  <text x="78" y="318" class="serif node-title">Marketplace</text>
  <text x="78" y="351" class="sans node-copy">Virtue Foundation dataset</text>
  <text x="78" y="382" class="sans node-copy">10,077 canonical facilities</text>
  <rect x="78" y="402" width="116" height="23" rx="11" fill="#fff0ed"/>
  <text x="136" y="419" text-anchor="middle" class="sans" font-size="12" font-weight="700" fill="#bf2d1d">SHARED CATALOG</text>

  <!-- Node 2 -->
  <g filter="url(#shadow)">
    <rect x="364" y="201" width="256" height="239" rx="18" fill="#ffffff" stroke="#d1ddd8"/>
    <rect x="364" y="201" width="256" height="7" rx="4" fill="#0a5652"/>
  </g>
  <rect x="384" y="228" width="54" height="54" rx="14" fill="#e3f2ed"/>
  <path d="M411 240 428 249v20l-17 9-17-9v-20Z" fill="none" stroke="#0a5652" stroke-width="2.5"/>
  <path d="m394 249 17 10 17-10M411 259v19" fill="none" stroke="#0a5652" stroke-width="2"/>
  <text x="454" y="246" class="sans node-label" fill="#0a5652">GOVERN</text>
  <text x="384" y="318" class="serif node-title">Unity Catalog</text>
  <text x="384" y="351" class="sans node-copy">Central access control</text>
  <text x="384" y="382" class="sans node-copy">Discovery, audit and lineage</text>
  <rect x="384" y="402" width="106" height="23" rx="11" fill="#e3f2ed"/>
  <text x="437" y="419" text-anchor="middle" class="sans" font-size="12" font-weight="700" fill="#0a5652">GOVERNED</text>

  <!-- Node 3 -->
  <g filter="url(#shadow)">
    <rect x="670" y="201" width="256" height="239" rx="18" fill="#ffffff" stroke="#d1ddd8"/>
    <rect x="670" y="201" width="256" height="7" rx="4" fill="#0b766e"/>
  </g>
  <rect x="690" y="228" width="54" height="54" rx="14" fill="#def0ea"/>
  <ellipse cx="717" cy="243" rx="15" ry="7" fill="none" stroke="#0b766e" stroke-width="2.5"/>
  <path d="M702 243v24c0 4 7 7 15 7s15-3 15-7v-24M702 255c0 4 7 7 15 7s15-3 15-7" fill="none" stroke="#0b766e" stroke-width="2.5"/>
  <text x="760" y="246" class="sans node-label" fill="#0b766e">TRANSFORM</text>
  <text x="690" y="318" class="serif node-title">SQL trust layer</text>
  <text x="690" y="349" class="sans node-copy">Clean + correct geography</text>
  <text x="690" y="378" class="sans node-copy">Extract sentence receipts</text>
  <text x="690" y="407" class="sans node-copy">Score six care capabilities</text>

  <!-- Node 4 -->
  <g filter="url(#shadow)">
    <rect x="976" y="201" width="256" height="239" rx="18" fill="#ffffff" stroke="#d1ddd8"/>
    <rect x="976" y="201" width="256" height="7" rx="4" fill="#009688"/>
  </g>
  <rect x="996" y="228" width="54" height="54" rx="14" fill="#e1f3ef"/>
  <use href="#fastapi-logo" x="1009" y="241" width="28" height="28" fill="#009688"/>
  <text x="1066" y="246" class="sans node-label" fill="#008b7e">SERVE</text>
  <text x="996" y="318" class="serif node-title">SQL + FastAPI</text>
  <text x="996" y="351" class="sans node-copy">Databricks SQL Warehouse</text>
  <text x="996" y="382" class="sans node-copy">Typed analytical endpoints</text>
  <rect x="996" y="402" width="90" height="23" rx="11" fill="#e1f3ef"/>
  <text x="1041" y="419" text-anchor="middle" class="sans" font-size="12" font-weight="700" fill="#008b7e">LIVE API</text>

  <!-- Node 5 -->
  <g filter="url(#shadow)">
    <rect x="1282" y="201" width="256" height="239" rx="18" fill="#ffffff" stroke="#d1ddd8"/>
    <rect x="1282" y="201" width="256" height="7" rx="4" fill="#087ea4"/>
  </g>
  <rect x="1302" y="228" width="54" height="54" rx="14" fill="#e5f7fc"/>
  <g transform="translate(1329 255)" fill="none" stroke="#087ea4" stroke-width="2">
    <ellipse rx="19" ry="7"/>
    <ellipse rx="19" ry="7" transform="rotate(60)"/>
    <ellipse rx="19" ry="7" transform="rotate(120)"/>
    <circle r="3.8" fill="#087ea4" stroke="none"/>
  </g>
  <text x="1372" y="246" class="sans node-label" fill="#087ea4">EXPERIENCE</text>
  <text x="1302" y="318" class="serif node-title">Planner workspace</text>
  <text x="1302" y="349" class="sans node-copy">React + TypeScript</text>
  <text x="1302" y="378" class="sans node-copy">Map | dossier | Access Finder</text>
  <text x="1302" y="407" class="sans node-copy">Evidence Copilot</text>

  <text x="58" y="484" class="sans eyebrow" fill="#0b766e">TRUST, REVIEW AND DELIVERY CONTROLS</text>

  <!-- Control 1 -->
  <rect x="58" y="505" width="470" height="112" rx="17" fill="#e2f2ed" stroke="#7cb4a8"/>
  <use href="#mlflow-logo" x="82" y="528" width="40" height="40" fill="#0194e2"/>
  <text x="142" y="541" class="sans control-title">MLflow release gate</text>
  <text x="142" y="569" class="sans control-copy">8 / 8 deterministic checks pass</text>
  <text x="142" y="594" class="sans" font-size="13" font-weight="700" fill="#0b766e">26,174 PROFILES EVALUATED</text>

  <!-- Control 2 -->
  <rect x="565" y="505" width="470" height="112" rx="17" fill="#faecd7" stroke="#d7a052"/>
  <g transform="translate(590 529)" fill="none" stroke="#4169e1" stroke-width="2.4">
    <ellipse cx="20" cy="8" rx="18" ry="7"/>
    <path d="M2 8v27c0 4 8 7 18 7s18-3 18-7V8M2 21c0 4 8 7 18 7s18-3 18-7"/>
  </g>
  <text x="650" y="541" class="sans control-title">Lakebase / PostgreSQL</text>
  <text x="650" y="569" class="sans control-copy">Human decision, note and identity</text>
  <text x="650" y="594" class="sans" font-size="13" font-weight="700" fill="#b87420">AUDITABLE OVERRIDES</text>

  <!-- Control 3 -->
  <rect x="1072" y="505" width="466" height="112" rx="17" fill="#e8eef1" stroke="#7d9caa"/>
  <use href="#github-logo" x="1097" y="528" width="40" height="40" fill="#181717"/>
  <text x="1157" y="541" class="sans control-title">GitHub Pages judge build</text>
  <text x="1157" y="569" class="sans control-copy">Anonymous read-only snapshot</text>
  <text x="1157" y="594" class="sans" font-size="13" font-weight="700" fill="#3f7286">SAME PRODUCT INTERFACE</text>

  <!-- Feedback connectors -->
  <g fill="none" stroke-width="2" stroke-dasharray="7 6">
    <path d="M293 505V493H798V443" stroke="#0194e2" marker-end="url(#arrow)"/>
    <path d="M800 505V493H1410V443" stroke="#c58732" marker-end="url(#arrow)"/>
    <path d="M1305 505V493H1470V443" stroke="#607d8b" marker-end="url(#arrow)"/>
  </g>

  <!-- Metrics -->
  <rect x="58" y="658" width="1480" height="99" rx="18" fill="#062e33"/>
  <g class="sans" text-anchor="middle">
    <text x="206" y="704" class="metric">10,077</text><text x="206" y="731" class="metric-label">FACILITIES</text>
    <text x="502" y="704" class="metric">26,174</text><text x="502" y="731" class="metric-label">CAPABILITY PROFILES</text>
    <text x="798" y="704" class="metric">75,651</text><text x="798" y="731" class="metric-label">EVIDENCE RECEIPTS</text>
    <text x="1094" y="704" class="metric">2,821</text><text x="1094" y="731" class="metric-label">REGIONAL AGGREGATES</text>
    <text x="1390" y="704" class="metric">6</text><text x="1390" y="731" class="metric-label">CARE CAPABILITIES</text>
  </g>
  <g stroke="#34545a">
    <path d="M354 679v57M650 679v57M946 679v57M1242 679v57"/>
  </g>

  <text x="58" y="792" class="sans" font-size="14" fill="#60736d">Evidence strength is not accreditation, live availability, or clinical advice.</text>
  <text x="1538" y="792" text-anchor="end" class="sans" font-size="14" font-weight="700" fill="#0b766e">gitzohair.github.io/careproof-india</text>
</svg>
